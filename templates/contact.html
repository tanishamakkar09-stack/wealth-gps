<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Us</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#F8F5F0;
    font-family:'Segoe UI',sans-serif;
}

.contact-box{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0px 10px 25px rgba(0,0,0,0.12);
    border-top:5px solid #C8A24A;
    margin-top:50px;
}

.brand{
    color:#8B1E2D;
    font-weight:700;
}

.info-card{
    background:#fafafa;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    border-left:5px solid #C8A24A;
}

.btn-ar{
    background:#8B1E2D;
    color:white;
    border:none;
}

.btn-ar:hover{
    background:#6B1020;
    color:white;
}

</style>

</head>

<body>

<div class="container">

<div class="contact-box">

<div class="text-center">

<img src="{{ url_for('static', filename='logo.png') }}"
style="max-width:250px;">

</div>

<h2 class="brand text-center mt-4">
Contact Anand Rathi Preferred
</h2>

<p class="text-center">
Connect with our wealth advisory team.
</p>

<div class="row mt-4">

<div class="col-md-4">

<div class="info-card">

<h5 class="brand">Phone</h5>

<p>
+91 XXXXX XXXXX
</p>

</div>

</div>

<div class="col-md-4">

<div class="info-card">

<h5 class="brand">Email</h5>

<p>
advisor@anandrathi.com
</p>

</div>

</div>

<div class="col-md-4">

<div class="info-card">

<h5 class="brand">Office Hours</h5>

<p>
Monday – Friday<br>
9:30 AM – 6:30 PM
</p>

</div>

</div>

</div>

<hr>

<h4 class="brand">
Send Us A Message
</h4>

<form>

<div class="row">

<div class="col-md-6">

<input
type="text"
class="form-control mb-3"
placeholder="Your Name">

</div>

<div class="col-md-6">

<input
type="email"
class="form-control mb-3"
placeholder="Your Email">

</div>

<div class="col-md-12">

<textarea
class="form-control mb-3"
rows="5"
placeholder="Your Message"></textarea>

</div>

</div>

<button
type="submit"
class="btn btn-ar">

Send Message

</button>

</form>

</div>

</div>

</body>

</html>
