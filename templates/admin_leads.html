<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Leads</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#F8F5F0;
    font-family:'Segoe UI',sans-serif;
}

.container-box{
    background:white;
    padding:40px;
    border-radius:20px;
    margin-top:40px;
    box-shadow:0px 10px 25px rgba(0,0,0,0.12);
    border-top:5px solid #C8A24A;
}

.brand{
    color:#8B1E2D;
    font-weight:700;
}

.btn-ar{
    background:#8B1E2D;
    color:white;
    border:none;
    font-weight:bold;
}

.btn-ar:hover{
    background:#6B1020;
    color:white;
}

</style>

</head>

<body>

<div class="container">

<div class="container-box">

<div class="text-center">

<img src="{{ url_for('static', filename='logo.png') }}"
style="max-width:250px;">

</div>

<h2 class="brand text-center mt-4">
Lead Management Dashboard
</h2>

<p class="text-center">
Captured client enquiries and portfolio review requests.
</p>

<div class="d-flex justify-content-end mb-3">

<a href="/download-excel"
class="btn btn-ar">

Download Excel

</a>

</div>

<table class="table table-bordered table-striped">

<thead>

<tr>

<th>ID</th>
<th>Name</th>
<th>Mobile</th>
<th>Email</th>
<th>Portfolio Value</th>
<th>Age</th>
<th>Income</th>

</tr>

</thead>

<tbody>

{% for lead in leads %}

<tr>

<td>{{lead[0]}}</td>
<td>{{lead[1]}}</td>
<td>{{lead[2]}}</td>
<td>{{lead[3]}}</td>
<td>{{lead[4]}}</td>
<td>{{lead[5]}}</td>
<td>{{lead[6]}}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</body>

</html>
