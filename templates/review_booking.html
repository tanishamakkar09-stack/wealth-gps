<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Portfolio Review</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#F8F5F0;
    font-family:'Segoe UI',sans-serif;
}

.booking-box{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0px 10px 25px rgba(0,0,0,0.12);
    border-top:5px solid #C8A24A;
    margin-top:50px;
}

.brand{
    color:#8B1E2D;
    font-weight:700;
}

.btn-ar{
    background:#8B1E2D;
    color:white;
    border:none;
    font-weight:bold;
}

.btn-ar:hover{
    background:#6B1020;
    color:white;
}

</style>

</head>

<body>

<div class="container">

<div class="booking-box">

<div class="text-center">

<img src="{{ url_for('static', filename='logo.png') }}"
style="max-width:250px;">

</div>

<h2 class="brand text-center mt-4">
Schedule Your Portfolio Review
</h2>

<p class="text-center">

Meet with an Anand Rathi Preferred Advisor
for a detailed portfolio assessment.

</p>

<form action="/book-review" method="POST">

<div class="row">

<div class="row g-4">

    <!-- Full Name -->
    <div class="col-md-6">
        <label class="form-label fw-semibold">Full Name</label>
        <input
        type="text"
        class="form-control"
        name="name"
        placeholder="Enter your full name"
        required>
    </div>

    <!-- Mobile -->
    <div class="col-md-6">
        <label class="form-label fw-semibold">Mobile Number</label>
        <input
        type="tel"
        class="form-control"
        name="mobile"
        placeholder="Enter your mobile number"
        required
        pattern="[6-9][0-9]{9}"
        maxlength="10">
    </div>

    <!-- Email -->
    <div class="col-md-6">
        <label class="form-label fw-semibold">Email Address</label>
        <input
        type="email"
        class="form-control"
        name="email"
        placeholder="Enter your email address"
        required>
    </div>

    <!-- RM -->
    <div class="col-md-6">
        <label class="form-label fw-semibold">Relationship Manager</label>

        <select
        class="form-select"
        name="relationship_manager"
        required>

            <option value="">Select Relationship Manager</option>

            <option value="Tanisha Makkar">Tanisha Makkar</option>
            <option value="Ma'am Name">Ma'am Name</option>
            <option value="Viraj Shah">Viraj Shah</option>

        </select>

    </div>

    <!-- Date -->
    <div class="col-md-6">
        <label class="form-label fw-semibold">Preferred Meeting Date</label>

        <input
        type="date"
        class="form-control"
        name="meeting_date"
        min="{{ today }}"
        required>

    </div>

    <!-- Time -->
    <div class="col-md-6">
        <label class="form-label fw-semibold">Preferred Time</label>

        <select
        class="form-select"
        name="meeting_time"
        required>

            <option value="">Select Time</option>

            <option>10:00 AM</option>
            <option>11:00 AM</option>
            <option>12:00 PM</option>
            <option>2:00 PM</option>
            <option>3:00 PM</option>
            <option>4:00 PM</option>
            <option>5:00 PM</option>

        </select>

    </div>

    <!-- Notes -->
    <div class="col-12">

        <label class="form-label fw-semibold">
            Additional Notes (Optional)
        </label>

        <textarea
        class="form-control"
        rows="5"
        name="notes"
        placeholder="Enter any additional information or topics you'd like to discuss..."></textarea>

    </div>

    <!-- Button -->
    <div class="col-12 mt-3">

        <button
        type="submit"
        class="btn btn-ar btn-lg w-100">

        Confirm Meeting Request

        </button>

    </div>

</div>

</form>

</div>

</div>

</body>

</html>
